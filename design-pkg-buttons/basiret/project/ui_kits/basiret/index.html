<!doctype html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <title>Basiret UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    body { background: var(--canvas); padding: 0; margin: 0; }
    .app { display: flex; min-height: 100vh; flex-direction: row-reverse; }

    /* Sidebar */
    .sb { width: 240px; background: var(--surface); border-inline-start: 1px solid var(--line); display: flex; flex-direction: column; padding: 22px 16px 18px; height: 100vh; position: sticky; top: 0; flex-shrink: 0; }
    .sb-brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 22px; }
    .sb-logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--purple-600), var(--purple-400)); color: #fff; display: grid; place-items: center; }
    .sb-name { font: 700 16px/1 'IBM Plex Sans Arabic'; letter-spacing: -.01em; color: var(--ink-900); }
    .sb-sub  { font: 500 11px/1 'Inter'; color: var(--ink-400); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
    .sb-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; margin-top: 4px; }
    .sb-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: var(--ink-600); font: 500 14px/1 'IBM Plex Sans Arabic'; cursor: pointer; transition: background .12s, color .12s; text-align: start; border: none; background: none; }
    .sb-item:hover { background: var(--ink-100); color: var(--ink-900); }
    .sb-item.is-active { background: var(--purple-50); color: var(--purple-700); font-weight: 600; }
    .sb-item.is-active svg { color: var(--purple-600); }
    .sb-foot { padding-top: 14px; border-top: 1px solid var(--line); }
    .sb-upgrade { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 14px; border-radius: 10px; background: var(--ink-900); color: #fff; font: 600 13px/1 'IBM Plex Sans Arabic'; width: 100%; border: none; cursor: pointer; }
    .sb-upgrade svg { color: var(--purple-300); }
    .sb-user { display: flex; align-items: center; gap: 10px; padding: 12px 4px 0; }
    .sb-av { width: 32px; height: 32px; border-radius: 50%; background: var(--purple-100); color: var(--purple-700); display: grid; place-items: center; font: 700 12px/1 'Inter'; }
    .sb-uname { font: 600 13px/1.2 'IBM Plex Sans Arabic'; color: var(--ink-900); }
    .sb-uplan { font: 500 11px/1.2 'IBM Plex Sans Arabic'; color: var(--ink-500); }

    /* Main */
    .main { flex: 1; padding: 28px 36px; min-width: 0; }
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
    .greet h1 { font: 700 26px/1.2 'IBM Plex Sans Arabic'; letter-spacing: -.015em; color: var(--ink-900); margin: 0; }
    .greet p { font: 400 14px/1.5 'IBM Plex Sans Arabic'; color: var(--ink-500); margin: 6px 0 0; }
    .top-actions { display: flex; gap: 10px; }
    .btn-primary { background: var(--purple-600); color: #fff; padding: 10px 18px; border-radius: 10px; font: 600 13px/1 'IBM Plex Sans Arabic'; border: none; cursor: pointer; }
    .btn-primary:hover { background: var(--purple-700); }
    .btn-secondary { background: var(--surface); color: var(--ink-900); border: 1px solid var(--line-strong); padding: 9px 17px; border-radius: 10px; font: 600 13px/1 'IBM Plex Sans Arabic'; cursor: pointer; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
    .tab { padding: 10px 14px; font: 500 13px/1 'IBM Plex Sans Arabic'; color: var(--ink-500); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.is-active { color: var(--purple-700); border-color: var(--purple-600); font-weight: 600; }

    /* Screens */
    .screen { display: none; }
    .screen.is-active { display: block; }

    /* KPI row */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
    .kpi { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px; box-shadow: var(--shadow-sm); }
    .kpi-eye { font: 600 11px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); }
    .kpi-num { font: 700 26px/1.1 'Inter'; font-variant-numeric: tabular-nums; color: var(--ink-900); margin: 8px 0 4px; letter-spacing: -.01em; }
    .kpi-delta { font: 600 12px/1 'Inter'; color: var(--success); }
    .kpi-delta.down { color: var(--danger); }

    /* Plan grid */
    .plan-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .day { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 12px; min-height: 220px; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow-sm); }
    .day-h { display: flex; align-items: baseline; justify-content: space-between; }
    .day-name { font: 600 12px/1 'IBM Plex Sans Arabic'; color: var(--ink-900); }
    .day-date { font: 500 11px/1 'Inter'; color: var(--ink-500); }
    .thumb { height: 72px; border-radius: 10px; position: relative; overflow: hidden; }
    .thumb::after { content:""; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.22) 0 1px, transparent 1px 14px); }
    .post-t { font: 600 12px/1.4 'IBM Plex Sans Arabic'; color: var(--ink-900); }
    .post-m { font: 500 11px/1 'IBM Plex Sans Arabic'; color: var(--ink-500); margin-top: auto; }
    .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px; font: 600 10px/1 'IBM Plex Sans Arabic'; width: fit-content; }
    .pill svg { width: 11px; height: 11px; }

    /* Post list */
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-row { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px; display: grid; grid-template-columns: 56px 1fr auto; gap: 16px; align-items: center; box-shadow: var(--shadow-sm); }
    .post-row .thumb { height: 56px; }
    .stats { display: flex; gap: 18px; font: 600 12px/1 'Inter'; font-variant-numeric: tabular-nums; color: var(--ink-700); }
    .stats span small { display: block; font: 500 10px/1 'Inter'; color: var(--ink-400); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

    /* Fab */
    .fab { position: fixed; bottom: 24px; left: 24px; display: inline-flex; align-items: center; gap: 10px; padding: 12px 18px 12px 14px; background: var(--ink-900); color: #fff; border-radius: 999px; box-shadow: var(--shadow-lg); font: 600 14px/1 'IBM Plex Sans Arabic'; cursor: pointer; border: none; }
    .fab-icon { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--purple-400), var(--purple-600)); display: grid; place-items: center; }
    .fab-sub { font: 500 11px/1 'Inter'; color: var(--purple-300); letter-spacing: .04em; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sb">
      <div class="sb-brand">
        <div class="sb-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="12" cy="12" r="3.2" fill="currentColor"/>
          </svg>
        </div>
        <div><div class="sb-name">بصيرة</div><div class="sb-sub">Basiret</div></div>
      </div>
      <nav class="sb-nav" id="sb-nav"></nav>
      <div class="sb-foot">
        <button class="sb-upgrade">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3l2.4 5.6L20 10l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-1.4L12 3z" fill="currentColor"/></svg>
          الترقية إلى Pro
        </button>
        <div class="sb-user">
          <div class="sb-av">TA</div>
          <div><div class="sb-uname">Tasyeer Abdalla</div><div class="sb-uplan">خطة مجانية</div></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="top">
        <div class="greet">
          <h1>أهلاً تيسير 👋 — أسبوع جيد ينتظرك</h1>
          <p>هذه نظرة سريعة على حسابك، وخطة المحتوى لهذا الأسبوع جاهزة للمراجعة.</p>
        </div>
        <div class="top-actions">
          <button class="btn-secondary">تصدير التقرير</button>
          <button class="btn-primary">إنشاء منشور جديد</button>
        </div>
      </div>

      <div class="tabs" id="tabs">
        <button class="tab is-active" data-screen="home">الرئيسية</button>
        <button class="tab" data-screen="plan">خطة المحتوى</button>
        <button class="tab" data-screen="posts">منشوراتي</button>
      </div>

      <!-- Home -->
      <section class="screen is-active" data-screen="home">
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-eye">المتابعون</div><div class="kpi-num">12,438</div><div class="kpi-delta">↑ 18.4%</div></div>
          <div class="kpi"><div class="kpi-eye">التفاعل</div><div class="kpi-num">3.42%</div><div class="kpi-delta">↑ 0.8%</div></div>
          <div class="kpi"><div class="kpi-eye">الوصول</div><div class="kpi-num">84,201</div><div class="kpi-delta">↑ 12.0%</div></div>
          <div class="kpi"><div class="kpi-eye">المنشورات</div><div class="kpi-num">26</div><div class="kpi-delta down">↓ 2</div></div>
        </div>
        <div class="post-list" id="recent"></div>
      </section>

      <!-- Plan -->
      <section class="screen" data-screen="plan">
        <div class="plan-grid" id="plan"></div>
      </section>

      <!-- Posts -->
      <section class="screen" data-screen="posts">
        <div class="post-list" id="all-posts"></div>
      </section>
    </main>
  </div>

  <button class="fab">
    <span class="fab-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 3v3M12 18v3M4.2 7.2l2 2M17.8 14.8l2 2M3 12h3M18 12h3"/></svg></span>
    <span>اسأل بصيرة</span>
    <span class="fab-sub">⌘K</span>
  </button>

  <script>
    // Nav
    const nav = [
      { id: 'home',     label: 'الرئيسية',    icon: '<path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 001 1h4v-6h4v6h4a1 1 0 001-1V9.5"/>' },
      { id: 'posts',    label: 'منشوراتي',    icon: '<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>' },
      { id: 'audience', label: 'جمهوري',     icon: '<circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 4.2a3.2 3.2 0 010 6.4"/>' },
      { id: 'plan',     label: 'خطة المحتوى', icon: '<rect x="3.5" y="5" width="17" height="15.5" rx="2"/><path d="M3.5 10h17"/><path d="M8 3v4M16 3v4"/>', active: true },
      { id: 'comp',     label: 'المنافسون',   icon: '<circle cx="12" cy="12" r="9"/><path d="M15.5 8.5L13.5 13.5L8.5 15.5L10.5 10.5L15.5 8.5z"/>' },
      { id: 'sent',    label: 'المشاعر',     icon: '<path d="M12 20s-7-4.5-7-10a4 4 0 017-2.7A4 4 0 0119 10c0 5.5-7 10-7 10z"/>' },
      { id: 'trends',   label: 'الاتجاهات',  icon: '<path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/>' },
    ];
    document.getElementById('sb-nav').innerHTML = nav.map(n=>`
      <button class="sb-item ${n.active?'is-active':''}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${n.icon}</svg>
        <span>${n.label}</span>
      </button>`).join('');

    // Data
    const TYPE = {
      video:    { ar: 'فيديو',  c: 'oklch(0.58 0.14 25)',  bg: 'rgba(234,105,90,0.10)',  i: '<rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3"/>' },
      image:    { ar: 'صورة',   c: 'oklch(0.58 0.14 180)', bg: 'rgba(70,168,158,0.10)',  i: '<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.8"/><path d="M21 16l-5-5-8 8"/>' },
      carousel: { ar: 'كاروسيل', c: 'oklch(0.58 0.14 295)', bg: 'rgba(124,92,239,0.10)', i: '<rect x="7" y="5" width="12" height="14" rx="2"/><path d="M4 7v10M22 9v6" opacity=".55"/>' },
    };
    const THUMB = {
      violet:'linear-gradient(135deg,#ede8ff,#c0b0ff)', cream:'linear-gradient(135deg,#fbf6ed,#f0e4cc)', peach:'linear-gradient(135deg,#fbeee7,#f2c8b4)',
      purple:'linear-gradient(135deg,#e8e0ff,#9b82f5)', mint:'linear-gradient(135deg,#e4f4ee,#b8e0ce)', sky:'linear-gradient(135deg,#e5eef9,#b8cfe7)',
      lavender:'linear-gradient(135deg,#f3eefb,#d5c4ee)'
    };
    const WEEK = [
      { day:'الأحد',    date:'٢٦ أبريل', type:'carousel', topic:'قصص عملاء: 3 نتائج من المنصة',    time:'18:00', thumb:'violet'   },
      { day:'الإثنين',  date:'٢٧ أبريل', type:'image',    topic:'اقتباس ملهم للأسبوع',             time:'09:00', thumb:'cream'    },
      { day:'الثلاثاء', date:'٢٨ أبريل', type:'video',    topic:'خلف الكواليس: كيف نصنع المحتوى',  time:'16:00', thumb:'peach'    },
      { day:'الأربعاء', date:'٢٩ أبريل', type:'video',    topic:'نصائح سريعة لنمو الحساب',         time:'16:00', thumb:'purple'   },
      { day:'الخميس',   date:'٣٠ أبريل', type:'carousel', topic:'مقارنة: قبل وبعد التسويق الذكي',  time:'18:00', thumb:'mint'     },
      { day:'الجمعة',   date:'١ مايو',   type:'image',    topic:'استطلاع: ما الأصعب في محتواك؟',   time:'11:00', thumb:'sky'      },
      { day:'السبت',    date:'٢ مايو',   type:'video',    topic:'درس مصغّر: كتابة عنوان يجذب',     time:'16:00', thumb:'lavender' },
    ];

    function pill(t){ const m = TYPE[t]; return `<span class="pill" style="background:${m.bg};color:${m.c}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">${m.i}</svg>${m.ar}</span>`; }

    // Plan grid
    document.getElementById('plan').innerHTML = WEEK.map(p=>`
      <div class="day">
        <div class="day-h"><span class="day-name">${p.day}</span><span class="day-date">${p.date}</span></div>
        <div class="thumb" style="background:${THUMB[p.thumb]}"></div>
        ${pill(p.type)}
        <div class="post-t">${p.topic}</div>
        <div class="post-m">${p.time}</div>
      </div>`).join('');

    // Recent on home
    document.getElementById('recent').innerHTML = WEEK.slice(0,4).map(p=>`
      <div class="post-row">
        <div class="thumb" style="background:${THUMB[p.thumb]}"></div>
        <div>
          <div class="post-t" style="font-size:14px">${p.topic}</div>
          <div style="display:flex;gap:8px;margin-top:6px;align-items:center">${pill(p.type)}<span class="post-m">${p.date} · ${p.time}</span></div>
        </div>
        <div class="stats">
          <span>${(2+Math.random()*3).toFixed(1)}%<small>تفاعل</small></span>
          <span>${Math.floor(800+Math.random()*4000).toLocaleString()}<small>وصول</small></span>
        </div>
      </div>`).join('');

    // All posts
    document.getElementById('all-posts').innerHTML = [...WEEK, ...WEEK].slice(0,9).map((p,i)=>`
      <div class="post-row">
        <div class="thumb" style="background:${THUMB[p.thumb]}"></div>
        <div>
          <div class="post-t" style="font-size:14px">${p.topic}</div>
          <div style="display:flex;gap:8px;margin-top:6px;align-items:center">${pill(p.type)}<span class="post-m">${p.date} · ${p.time}</span></div>
        </div>
        <div class="stats">
          <span>${(2+(i*0.4)%3).toFixed(1)}%<small>تفاعل</small></span>
          <span>${(1200+i*430).toLocaleString()}<small>وصول</small></span>
          <span>${(40+i*12).toLocaleString()}<small>تعليقات</small></span>
        </div>
      </div>`).join('');

    // Tab switching
    document.getElementById('tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab'); if (!tab) return;
      document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('is-active', t===tab));
      const id = tab.dataset.screen;
      document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('is-active', s.dataset.screen===id));
    });
  </script>
</body>
</html>
