<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Colors — Content types</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--surface); }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 10px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card { border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
  .pair { display: flex; gap: 6px; margin-bottom: 12px; }
  .sw { flex: 1; height: 36px; border-radius: 8px; }
  .name { font: 600 13px/1 'IBM Plex Sans Arabic'; color: var(--ink-900); }
  .var  { font: 500 10px/1.4 'Inter'; color: var(--ink-500); margin-top: 4px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font: 600 12px/1 'IBM Plex Sans Arabic'; margin-top: 10px; }
  .pill svg { width: 13px; height: 13px; }
</style></head><body>
<div class="lbl">Content-type hues — equal chroma in oklch</div>
<div class="row">
  <div class="card">
    <div class="pair"><div class="sw" style="background:oklch(0.58 0.14 25)"></div><div class="sw" style="background:rgba(234,105,90,0.10)"></div></div>
    <div class="name">Video — coral</div>
    <div class="var">--video / --video-tone</div>
    <span class="pill" style="background:rgba(234,105,90,0.10);color:oklch(0.58 0.14 25)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3"/></svg>
      فيديو</span>
  </div>
  <div class="card">
    <div class="pair"><div class="sw" style="background:oklch(0.58 0.14 180)"></div><div class="sw" style="background:rgba(70,168,158,0.10)"></div></div>
    <div class="name">Image — teal</div>
    <div class="var">--image / --image-tone</div>
    <span class="pill" style="background:rgba(70,168,158,0.10);color:oklch(0.58 0.14 180)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.8"/><path d="M21 16l-5-5-8 8"/></svg>
      صورة</span>
  </div>
  <div class="card">
    <div class="pair"><div class="sw" style="background:oklch(0.58 0.14 295)"></div><div class="sw" style="background:rgba(124,92,239,0.10)"></div></div>
    <div class="name">Carousel — violet</div>
    <div class="var">--carousel / --carousel-tone</div>
    <span class="pill" style="background:rgba(124,92,239,0.10);color:oklch(0.58 0.14 295)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="7" y="5" width="12" height="14" rx="2"/><path d="M4 7v10M22 9v6" opacity=".55"/></svg>
      كاروسيل</span>
  </div>
</div>
</body></html>
