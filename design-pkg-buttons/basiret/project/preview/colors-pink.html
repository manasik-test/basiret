<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Colors — Pink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--surface); }
  .scale { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 1/1.1; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; font: 600 10px/1 'Inter'; }
  .swatch .h { font-weight: 500; opacity: .7; font-size: 9px; }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 8px; }
  .anchor { outline: 2px solid #fff; outline-offset: -4px; }
</style></head><body>
<div class="lbl">Pink — secondary · anchored on #BF499B</div>
<div class="scale" id="s"></div>
<script>
  const tones = [50,100,200,300,400,500,600,700];
  const hex   = ['#fbf2f8','#f6e2ee','#ecc4dd','#dd9bc4','#cc6cab','#BF499B','#a23a82','#832e69'];
  document.getElementById('s').innerHTML = tones.map((t,i)=>{
    const dark = t >= 400;
    const isAnchor = t === 500;
    return `<div class="swatch ${isAnchor?'anchor':''}" style="background:${hex[i]}; color:${dark?'#fff':'#832e69'}">
      <span>${t}</span><span class="h">${hex[i]}</span></div>`;
  }).join('');
</script>
</body></html>
