<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Type Pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--surface); }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font: 600 12px/1 'IBM Plex Sans Arabic'; }
  .pill.sm { padding: 3px 8px; font-size: 11px; }
  .pill svg { stroke-width: 1.8; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; font: 600 11px/1 'IBM Plex Sans Arabic'; }
  .badge-suggest { background: var(--purple-100); color: var(--purple-700); }
  .badge-pro { background: var(--ink-900); color: #fff; }
  .badge-new { background: rgba(47,158,107,.12); color: var(--success); }
</style></head><body>
<div class="lbl">Content type pills</div>
<div class="row">
  <span class="pill" style="background:rgba(234,105,90,0.10);color:oklch(0.58 0.14 25)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3"/></svg> فيديو</span>
  <span class="pill" style="background:rgba(70,168,158,0.10);color:oklch(0.58 0.14 180)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.8"/><path d="M21 16l-5-5-8 8"/></svg> صورة</span>
  <span class="pill" style="background:rgba(124,92,239,0.10);color:oklch(0.58 0.14 295)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><rect x="7" y="5" width="12" height="14" rx="2"/><path d="M4 7v10M22 9v6" opacity=".55"/></svg> كاروسيل</span>
  <span class="pill sm" style="background:rgba(234,105,90,0.10);color:oklch(0.58 0.14 25)">فيديو</span>
  <span class="pill sm" style="background:rgba(70,168,158,0.10);color:oklch(0.58 0.14 180)">صورة</span>
</div>
<div class="lbl">Status badges</div>
<div class="row">
  <span class="badge badge-suggest">اقتراح بصيرة</span>
  <span class="badge badge-pro">Pro</span>
  <span class="badge badge-new">جديد</span>
</div>
</body></html>
