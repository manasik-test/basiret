<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Colors — Sky</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--surface); }
  .scale { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 1/1.1; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; font: 600 10px/1 'Inter'; border: 1px solid var(--line); }
  .swatch .h { font-weight: 500; opacity: .7; font-size: 9px; }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 8px; }
  .anchor { outline: 2px solid var(--ink-900); outline-offset: -4px; }
</style></head><body>
<div class="lbl">Sky — tertiary · anchored on #A5DDEC</div>
<div class="scale" id="s"></div>
<script>
  const tones = [50,100,200,300,400,500,600];
  const hex   = ['#f1fafd','#dff2f8','#c6e8f2','#A5DDEC','#7cc6db','#56adc6','#3e8ca3'];
  document.getElementById('s').innerHTML = tones.map((t,i)=>{
    const dark = t >= 500;
    const isAnchor = t === 300;
    return `<div class="swatch ${isAnchor?'anchor':''}" style="background:${hex[i]}; color:${dark?'#fff':'#1c1a28'}">
      <span>${t}</span><span class="h">${hex[i]}</span></div>`;
  }).join('');
</script>
</body></html>
