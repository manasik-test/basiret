<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface); }
  .row { display: flex; flex-direction: column; gap: 14px; }
  .specimen { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
  .specimen:last-child { border-bottom: none; }
  .label { font: 500 11px/1 'Inter'; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-400); width: 110px; flex-shrink: 0; }
  .meta  { font: 500 11px/1 'Inter'; color: var(--ink-500); margin-inline-start: auto; }
</style></head><body>
<div class="row">
  <div class="specimen"><span class="label">Body</span><span class="bsr-body">صناعة المحتوى الذي يلامس جمهورك يبدأ بفهمه أولاً.</span><span class="meta">14 / 400 / 1.55</span></div>
  <div class="specimen"><span class="label">Body sm</span><span class="bsr-body-sm">اقتراح بصيرة بناءً على أداء آخر ٣٠ يوماً.</span><span class="meta">13 / 400</span></div>
  <div class="specimen"><span class="label">Caption</span><span class="bsr-caption">آخر تحديث منذ ٣ ساعات</span><span class="meta">12 / 500</span></div>
  <div class="specimen"><span class="label">Eyebrow</span><span class="bsr-eyebrow">CONTENT PLAN</span><span class="meta">11 / 600 / 0.08em</span></div>
  <div class="specimen"><span class="label">Numerals</span><span class="bsr-num" style="font-size:22px; font-weight:600; color:var(--ink-900)">12,438 · +18.4%</span><span class="meta">Inter · tabular</span></div>
</div>
</body></html>
