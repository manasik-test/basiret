<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--surface); }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 12px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .card { border: 1px solid var(--line); padding: 12px; border-radius: 12px; }
  .demo { height: 60px; background: var(--purple-100); border: 1px solid var(--purple-200); margin-bottom: 8px; }
  .name { font: 600 12px/1 'IBM Plex Sans Arabic'; color: var(--ink-900); }
  .var { font: 500 10px/1.3 'Inter'; color: var(--ink-500); margin-top: 4px; }
</style></head><body>
<div class="lbl">Radii</div>
<div class="row">
  <div class="card"><div class="demo" style="border-radius:8px"></div><div class="name">--radius-sm</div><div class="var">8px · inputs, chips</div></div>
  <div class="card"><div class="demo" style="border-radius:12px"></div><div class="name">--radius</div><div class="var">12px · default cards</div></div>
  <div class="card"><div class="demo" style="border-radius:16px"></div><div class="name">--radius-lg</div><div class="var">16px · prominent</div></div>
  <div class="card"><div class="demo" style="border-radius:24px"></div><div class="name">--radius-xl</div><div class="var">24px · sheets</div></div>
  <div class="card"><div class="demo" style="border-radius:999px"></div><div class="name">--radius-pill</div><div class="var">pills, badges</div></div>
</div>
</body></html>
