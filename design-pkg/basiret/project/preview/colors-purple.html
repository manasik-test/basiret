<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Colors — Purple</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--surface); }
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .swatch { aspect-ratio: 1/1.1; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; font: 600 10px/1 'Inter'; }
  .swatch .h { font-weight: 500; opacity: .7; font-size: 9px; }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 8px; }
  .anchor { font-weight: 800; outline: 2px solid #fff; outline-offset: -4px; border-radius: 10px; }
</style></head><body>
<div class="lbl">Purple — primary brand · anchored on #664FA1</div>
<div class="scale" id="s"></div>
<script>
  const tones = [50,100,200,300,400,500,600,700,800,900];
  const hex   = ['#f4f1fa','#e8e1f4','#d2c5e9','#b09ad6','#8c70bf','#7559b0','#664FA1','#543f88','#41306b','#2c2049'];
  document.getElementById('s').innerHTML = tones.map((t,i)=>{
    const dark = t >= 400;
    const isAnchor = t === 600;
    return `<div class="swatch ${isAnchor?'anchor':''}" style="background:${hex[i]}; color:${dark?'#fff':'#2c2049'}">
      <span>${t}</span><span class="h">${hex[i]}</span></div>`;
  }).join('');
</script>
</body></html>
