<!doctype html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <title>Basiret Design System</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    body { background: var(--canvas); margin: 0; padding: 0; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 48px 36px 80px; }

    .hero {
      display: flex; align-items: center; gap: 18px; margin-bottom: 8px;
    }
    .hero-logo { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, var(--purple-600), var(--purple-400)); color: #fff; display: grid; place-items: center; }
    .hero h1 { font: 700 32px/1 'IBM Plex Sans Arabic'; letter-spacing: -.02em; color: var(--ink-900); margin: 0; }
    .hero-sub { font: 500 12px/1 'Inter'; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-400); margin-top: 6px; }
    .hero-tag { font: 400 15px/1.5 'IBM Plex Sans Arabic'; color: var(--ink-600); margin: 18px 0 0; max-width: 60ch; }

    .toc { display: flex; flex-wrap: wrap; gap: 8px; margin: 28px 0 44px; padding: 16px 18px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow-sm); }
    .toc a { font: 600 12px/1 'IBM Plex Sans Arabic'; color: var(--ink-700); padding: 8px 12px; border-radius: 999px; background: var(--ink-100); transition: background .12s, color .12s; }
    .toc a:hover { background: var(--purple-50); color: var(--purple-700); }

    .group { margin-bottom: 56px; scroll-margin-top: 24px; }
    .group-h { display: flex; align-items: baseline; gap: 14px; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
    .group-h h2 { font: 700 20px/1 'IBM Plex Sans Arabic'; letter-spacing: -.01em; color: var(--ink-900); margin: 0; }
    .group-h .count { font: 600 11px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid.full { grid-template-columns: 1fr; }

    .card {
      background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
      box-shadow: var(--shadow-sm); overflow: hidden; display: flex; flex-direction: column;
    }
    .card-h {
      padding: 14px 18px; border-bottom: 1px solid var(--line);
      display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    }
    .card-h .t { font: 600 14px/1.3 'IBM Plex Sans Arabic'; color: var(--ink-900); }
    .card-h .s { font: 500 12px/1.3 'IBM Plex Sans Arabic'; color: var(--ink-500); margin-top: 3px; }
    .card-h .open { font: 600 11px/1 'Inter'; color: var(--ink-500); padding: 6px 10px; border-radius: 999px; background: var(--ink-100); }
    .card-h .open:hover { background: var(--purple-50); color: var(--purple-700); }
    iframe { display: block; width: 100%; border: none; background: var(--surface); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="hero-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="3.2" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1>بصيرة — Design System</h1>
        <div class="hero-sub">Basiret · v1.0</div>
      </div>
    </header>
    <p class="hero-tag">نظام التصميم الكامل لمنصة بصيرة — الألوان، الطباعة، المسافات، والمكوّنات الأساسية. كل بطاقة قابلة للفتح بشكل مستقل.</p>

    <nav class="toc" id="toc"></nav>

    <main id="root"></main>
  </div>

  <script>
    const SECTIONS = [
      { id: 'type', title: 'Type · الطباعة', cols: 1, items: [
        { src: 'preview/type-display.html', t: 'Display & Headings', s: 'Display, H1, H2, H3', h: 260 },
        { src: 'preview/type-body.html',    t: 'Body & Captions',    s: 'Body, caption, eyebrow, numerals', h: 320 },
      ]},
      { id: 'colors', title: 'Colors · الألوان', cols: 2, items: [
        { src: 'preview/colors-purple.html',         t: 'Purple scale',     s: 'Primary · anchored on #664FA1', h: 200 },
        { src: 'preview/colors-pink.html',           t: 'Pink scale',       s: 'Secondary · anchored on #BF499B', h: 200 },
        { src: 'preview/colors-sky.html',            t: 'Sky scale',        s: 'Tertiary · anchored on #A5DDEC', h: 200 },
        { src: 'preview/colors-ink.html',            t: 'Ink neutrals',     s: 'Cool grays · 50–950', h: 200 },
        { src: 'preview/colors-semantic.html',       t: 'Surfaces & status',s: 'Surface, canvas, line, status', h: 320 },
        { src: 'preview/colors-content-types.html',  t: 'Content types',    s: 'Video · image · carousel', h: 280 },
      ]},
      { id: 'spacing', title: 'Spacing · المسافات', cols: 2, items: [
        { src: 'preview/spacing.html',  t: 'Spacing scale', s: '4px base · s-1 → s-12', h: 360 },
        { src: 'preview/radii.html',    t: 'Radii',         s: 'sm, default, lg, xl, pill', h: 220 },
        { src: 'preview/shadows.html',  t: 'Shadows',       s: 'Three steps, ink-tinted', h: 220, full: true },
      ]},
      { id: 'components', title: 'Components · المكوّنات', cols: 2, items: [
        { src: 'preview/components-buttons.html', t: 'Buttons',          s: 'Primary, secondary, ghost, dark, icon', h: 160 },
        { src: 'preview/components-inputs.html',  t: 'Inputs & search',  s: 'Field with label, search bar', h: 250 },
        { src: 'preview/components-cards.html',   t: 'Cards',            s: 'KPI · post tile', h: 220 },
        { src: 'preview/components-pills.html',   t: 'Pills & badges',   s: 'Content type, status', h: 220 },
        { src: 'preview/components-nav.html',     t: 'Nav item states',  s: 'Rest, hover, active', h: 250 },
        { src: 'preview/components-avatar.html',  t: 'Avatars',          s: '32 / 40 / 56 + user block', h: 280 },
        { src: 'preview/components-askfab.html',  t: 'AskFab',           s: 'Floating ⌘K assistant', h: 160, full: true },
      ]},
      { id: 'brand', title: 'Brand · الهوية', cols: 2, items: [
        { src: 'preview/brand-logo.html',    t: 'Logo & wordmark', s: 'Full lockup, mark-only, on-dark/off-white', h: 320, full: true },
        { src: 'preview/brand-palette.html', t: 'Official palette', s: '#664FA1 · #BF499B · #A5DDEC + off-white & ink', h: 360, full: true },
        { src: 'preview/brand-icons.html',   t: 'Iconography',     s: '16-glyph stroked set', h: 280 },
        { src: 'preview/brand-thumbs.html',  t: 'Thumbnail palette', s: 'Tonal gradients for content', h: 180 },
      ]},
      { id: 'kit', title: 'UI Kit · النموذج التفاعلي', cols: 1, items: [
        { src: 'ui_kits/basiret/index.html', t: 'Basiret app — interactive', s: 'Sidebar · top bar · 3 screens · AskFab', h: 820 },
      ]},
    ];

    // TOC
    document.getElementById('toc').innerHTML = SECTIONS.map(s =>
      `<a href="#${s.id}">${s.title}</a>`).join('');

    // Sections
    document.getElementById('root').innerHTML = SECTIONS.map(s => {
      const total = s.items.length;
      const cards = s.items.map(it => `
        <div class="card" ${it.full ? 'style="grid-column: 1 / -1"' : ''}>
          <div class="card-h">
            <div><div class="t">${it.t}</div><div class="s">${it.s}</div></div>
            <a class="open" href="${it.src}" target="_blank">Open ↗</a>
          </div>
          <iframe src="${it.src}" style="height:${it.h}px" loading="lazy"></iframe>
        </div>`).join('');
      return `
        <section class="group" id="${s.id}">
          <div class="group-h"><h2>${s.title}</h2><span class="count">${total} card${total>1?'s':''}</span></div>
          <div class="grid ${s.cols === 1 ? 'full' : ''}">${cards}</div>
        </section>`;
    }).join('');
  </script>
</body>
</html>
