<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--surface); }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 14px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 4px; border: 1px solid var(--line); border-radius: 10px; }
  .cell svg { color: var(--ink-700); }
  .cell .n { font: 500 10px/1 'Inter'; color: var(--ink-500); }
</style></head><body>
