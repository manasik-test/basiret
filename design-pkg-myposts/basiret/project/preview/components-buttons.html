<!doctype html>
<html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--surface); }
  .lbl { font: 600 10px/1 'Inter'; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-400); margin: 0 0 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
  .row:last-child { margin-bottom: 0; }
  button { font-family: inherit; cursor: pointer; border: none; }
  .btn-primary { background: var(--purple-600); color: #fff; padding: 10px 18px; border-radius: 10px; font: 600 13px/1 'IBM Plex Sans Arabic'; transition: background .12s; }
  .btn-primary:hover { background: var(--purple-700); }
  .btn-secondary { background: var(--surface); color: var(--ink-900); border: 1px solid var(--line-strong); padding: 9px 17px; border-radius: 10px; font: 600 13px/1 'IBM Plex Sans Arabic'; }
  .btn-secondary:hover { background: var(--ink-100); }
  .btn-ghost { background: transparent; color: var(--ink-700); padding: 8px 14px; border-radius: 10px; font: 500 13px/1 'IBM Plex Sans Arabic'; }
  .btn-ghost:hover { background: var(--ink-100); color: var(--ink-900); }
  .btn-dark { background: var(--ink-900); color: #fff; padding: 10px 18px; border-radius: 10px; font: 600 13px/1 'IBM Plex Sans Arabic'; display: inline-flex; align-items: center; gap: 8px; }
  .btn-dark svg { color: var(--purple-300); }
  .btn-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--surface); border: 1px solid var(--line); display: inline-grid; place-items: center; color: var(--ink-700); }
  .btn-icon:hover { background: var(--ink-100); }
</style></head><body>
<div class="lbl">Buttons</div>
<div class="row">
  <button class="btn-primary">إنشاء منشور جديد</button>
  <button class="btn-secondary">تصدير</button>
  <button class="btn-ghost">إلغاء</button>
  <button class="btn-dark">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3l2.4 5.6L20 10l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-1.4L12 3z" fill="currentColor"/></svg>
    الترقية إلى Pro
  </button>
  <button class="btn-icon">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
  </button>
</div>
</body></html>
