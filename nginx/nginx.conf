# BASIRET — production nginx (basiret.co)
#
# - Port 80 redirects everything to HTTPS, except the ACME challenge path
#   used by certbot for cert renewal (webroot mode)
# - Port 443 terminates TLS and proxies:
#       /api/*  -> api:8000   (FastAPI)
#       /*      -> frontend:3000  (Vite preview / React build)
# - Stripe webhook path is treated like any other /api request — FastAPI
#   reads the raw body to verify the signature, so we don't gzip or
#   buffer it client-side here

# ── HTTP: ACME challenge + redirect to HTTPS ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name basiret.co www.basiret.co;

    # Let's Encrypt webroot challenge (used by certbot renew)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main app ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name basiret.co www.basiret.co;

    # SSL — managed by certbot, mounted read-only from /etc/letsencrypt
    ssl_certificate     /etc/letsencrypt/live/basiret.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/basiret.co/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow up to 10 MB uploads (e.g. profile pictures, OCR images)
    client_max_body_size 10M;

    # Gzip text responses (skip binary)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── /api/* -> FastAPI ─────────────────────────────────────
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Stripe webhook signature verification needs the raw body — leave
        # request buffering to FastAPI/Starlette
        proxy_request_buffering off;

        # Long-running endpoints (NLP analysis trigger, segment regen)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── /* -> React build served by frontend container ───────
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (vite preview's HMR ping; harmless in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
