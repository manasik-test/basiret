name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      SERVER_HOST: 178.104.191.148
      SERVER_USER: root
      REPO_DIR: /opt/basiret
      EXPECTED_HOST_FPR: SHA256:7jSQX1P6o7RuRTOtTfLhtkpKucM65eRPC1PSAz+IVjc

    steps:
      - name: Configure SSH key and verify server host key
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVER_SSH_KEY:-}" ]; then
            echo "::error::SERVER_SSH_KEY secret is not set"
            exit 1
          fi

          mkdir -p ~/.ssh && chmod 700 ~/.ssh

          # Private key for authenticating to the server
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # known_hosts needs the full public host key, not just a fingerprint.
          # Fetch the server's host keys, verify ONE matches the expected SHA256
          # fingerprint, and trust only that key. This rejects MITMs without
          # requiring us to paste the raw key into the repo.
          ssh-keyscan "$SERVER_HOST" > /tmp/host_keys 2>/dev/null
          if [ ! -s /tmp/host_keys ]; then
            echo "::error::ssh-keyscan returned no keys from $SERVER_HOST"
            exit 1
          fi

          matched=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            fpr=$(echo "$line" | ssh-keygen -lf - 2>/dev/null | awk '{print $2}')
            if [ "$fpr" = "$EXPECTED_HOST_FPR" ]; then
              matched="$line"
              break
            fi
          done < /tmp/host_keys

          if [ -z "$matched" ]; then
            echo "::error::No host key from $SERVER_HOST matched $EXPECTED_HOST_FPR"
            echo "Server returned:"
            ssh-keygen -lf /tmp/host_keys
            exit 1
          fi

          echo "$matched" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "Verified $SERVER_HOST host key matches $EXPECTED_HOST_FPR"

      - name: Deploy (git pull + docker compose up --build, rollback on failure)
        run: |
          ssh -i ~/.ssh/deploy_key "$SERVER_USER@$SERVER_HOST" REPO_DIR="$REPO_DIR" bash <<'REMOTE'
          set -euo pipefail
          cd "$REPO_DIR"

          # Snapshot the SHA we're rolling forward from so we can revert the
          # working tree if the new build fails to come up. We ignore detached-
          # HEAD and missing-ref edge cases (first deploy) — `git rev-parse`
          # returns "HEAD" verbatim if there are no commits yet, which is a
          # safe no-op for the rollback path below.
          PREV_SHA=$(git rev-parse HEAD)
          echo "Previous SHA: $PREV_SHA"

          git pull --ff-only

          # Try to build + start the new stack. On failure: restore the
          # working tree to $PREV_SHA and re-up the previous images so the
          # site stays live, then exit non-zero to fail the workflow run.
          # Wraps both build+start AND alembic upgrade — if the new code's
          # migrations fail to apply, the new containers are already running
          # but referencing columns that don't exist (the Day-3-4 prod-500
          # incident). Rollback reverts code AND containers so the previous
          # version's bundle + schema stay live together.
          if ! (
            docker compose -f docker-compose.prod.yml up -d --build \
            && docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
          ); then
            echo "::error::deploy step failed — rolling back to $PREV_SHA"
            git reset --hard "$PREV_SHA"
            # Best-effort restore of the previous containers. If THIS also
            # fails the previous containers were already running (compose up
            # only restarts what changed), so the site likely never actually
            # went down.
            docker compose -f docker-compose.prod.yml up -d || true
            docker compose -f docker-compose.prod.yml ps
            exit 1
          fi

          # Show the post-migration head so the workflow log records what
          # was applied. Idempotent: shows the same line on no-op runs.
          docker compose -f docker-compose.prod.yml exec -T api alembic current

          docker compose -f docker-compose.prod.yml ps
          REMOTE
